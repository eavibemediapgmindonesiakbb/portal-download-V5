<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="theme-color" content="#16a34a">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    :root{--hijau-pgm:#16a34a;--hijau-muda:#dcfce7;--putih:#fff;--abu:#f3f4f6;--shadow:0 4px 12px rgba(0,0,0,0.08)}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow-x:hidden}
    body{background:var(--abu);color:#1f2937}
    #splash{position:fixed;inset:0;background:var(--hijau-pgm);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
   .splash-content{text-align:center;color:var(--putih)}
   .splash-logo{width:90px;height:90px;object-fit:contain;margin-bottom:16px}
   .splash-content h1{font-size:22px;line-height:1.3;font-weight:700;margin-bottom:24px}
   .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.3);border-top:3px solid #fff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
   .container{max-width:480px;width:100%;margin:0 auto;padding:16px;min-height:100vh;min-height:100dvh}
   .login-card{background:var(--putih);padding:28px 20px;border-radius:24px;box-shadow:var(--shadow);text-align:center;margin-top:8vh}
   .logo{width:70px;margin-bottom:8px}
   .login-card h2{color:var(--hijau-pgm);font-size:18px;margin-bottom:24px;line-height:1.3;font-weight:700}
   .input-group{display:flex;align-items:center;background:var(--abu);border-radius:14px;padding:0 16px;margin-bottom:14px;height:52px}
   .input-group i{color:#6b7280;margin-right:12px;font-size:18px}
   .input-group input{border:none;outline:none;background:transparent;width:100%;font-size:16px;font-weight:500}
   .btn-primary{width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:600;border:none;cursor:pointer;background:var(--hijau-pgm);color:var(--putih)}
   .btn-primary:active{transform:scale(0.98)}
   .btn-primary:disabled{background:#9ca3af}
   .login-footer{margin-top:22px;display:flex;flex-direction:column;gap:12px}
   .login-footer a{color:var(--hijau-pgm);text-decoration:none;font-size:14px;font-weight:500}
   .version{text-align:center;font-size:11px;color:#6b7280;margin-top:24px;padding-bottom:20px}
    #errorMsg{color:#dc2626;font-size:13px;margin-bottom:10px;display:none}
  </style>
</head>
<body>
  <div id="splash">
    <div class="splash-content">
      <img src="https://drive.google.com/uc?export=view&id=1oVSlYkJJtZ9q7z8F7pN8p8p8p8p8" alt="Logo PGM" class="splash-logo">
      <h1>PGM INDONESIA<br>BANDUNG BARAT</h1>
      <div class="spinner"></div>
      <p>Portal V5</p>
    </div>
  </div>

  <div class="container" id="loginPage" style="display:none">
    <div class="login-card">
      <img src="https://drive.google.com/uc?export=view&id=1oVSlYkJJtZ9q7z8F7pN8p8p8p8p8" class="logo" alt="PGM">
      <h2>PGM Indonesia<br>Bandung Barat</h2>
      <div id="errorMsg"></div>
      <div class="input-group">
        <i class="fa-solid fa-id-card"></i>
        <input type="tel" id="nik" placeholder="Masukan NIK" inputmode="numeric">
      </div>
      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Masukan Password">
      </div>
      <button class="btn-primary" id="btnLogin" onclick="handleLogin()">
        <i class="fa-solid fa-right-to-bracket"></i> Masuk
      </button>
      <div class="login-footer">
        <a href="#" onclick="lupaPass()">Lupa Password? Hubungi Admin</a>
        <a href="#" onclick="daftar()">Daftar Sekarang</a>
      </div>
    </div>
    <p class="version">©2026 Tim Media PGM Indonesia KBB | Portal V5</p>
  </div>
  <?!= include('script');?>
</body>
</html>
