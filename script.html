
<script>
window.onload = () => {
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('loginPage').style.display = 'block';
  }, 1500);
}

function handleLogin() {
  const nik = document.getElementById('nik').value.trim();
  const pass = document.getElementById('password').value.trim();
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('errorMsg');

  err.style.display = 'none';
  if(!nik ||!pass) {
    err.innerText = 'NIK dan Password wajib diisi';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading...';

  google.script.run
.withSuccessHandler(res => {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk';
      if(res.success) {
        sessionStorage.setItem('nik', res.nik);
        window.location.href = '?page=dashboard';
      } else {
        err.innerText = res.message;
        err.style.display = 'block';
      }
    })
.withFailureHandler(error => {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk';
      err.innerText = 'Error: ' + error.message;
      err.style.display = 'block';
      console.error('Login Error:', error);
    })
.loginUser(nik, pass);
}

function lupaPass() {
  window.open('https://wa.me/62812xxxxxxx?text=Assalamualaikum%20Admin%20PGM%2C%20saya%20lupa%20password', '_blank');
}

function daftar() {
  window.open('https://forms.gle/FormPendataanAnggota', '_blank');
}
</script>
